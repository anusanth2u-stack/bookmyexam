# Render Blueprint — deploy with "New +" -> "Blueprint" pointed at this repo.
# Set the secret env vars (marked sync:false) in the Render dashboard.
services:
  - type: web
    name: bookmyexam-api
    runtime: python
    plan: starter
    region: singapore            # closest Render region to India
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT -w 2
    healthCheckPath: /api/health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  - type: cron
    name: bookmyexam-ranking
    runtime: python
    schedule: "*/15 * * * *"      # every 15 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/compute_ranks.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
